    <!-- JavaScript for fade-in animations -->
    <script>
        // Fade-in animation on scroll
        const fadeElements = document.querySelectorAll('.fade-in');
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, {
            threshold: 0.1
        });
        
        fadeElements.forEach(el => observer.observe(el));
        
        // Smooth scroll for navigation links (fallback)
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>

        <script>
        (function(){
            var pathName = window.location.pathname;
            var currentLang = pathName.indexOf('/en/') !== -1 ? 'en' : 'ru';
            var trigger = document.querySelector('[data-lang-trigger]');
            var menu = document.querySelector('[data-lang-menu]');
            var current = document.querySelector('[data-lang-current]');
            var options = Array.from(document.querySelectorAll('[data-lang-option]'));

            if (current) current.textContent = currentLang === 'en' ? 'en' : 'ru';
            options.forEach(function(opt){
                opt.classList.toggle('active', opt.getAttribute('data-lang-option') === currentLang);
            });

            function toLangUrl(lang){
                var p = window.location.pathname;
                var file = p.substring(p.lastIndexOf('/') + 1) || 'index.html';
                return '../' + lang + '/' + file;
            }

            function closeMenu(){
                if (!menu || !trigger) return;
                menu.classList.add('hidden');
                trigger.setAttribute('aria-expanded', 'false');
            }

            if (trigger && menu) {
                trigger.addEventListener('click', function(){
                    var isHidden = menu.classList.contains('hidden');
                    menu.classList.toggle('hidden');
                    trigger.setAttribute('aria-expanded', isHidden ? 'true' : 'false');
                });
            }

            options.forEach(function(opt){
                opt.addEventListener('click', function(){
                    var next = opt.getAttribute('data-lang-option');
                    window.location.href = toLangUrl(next);
                });
            });

            document.addEventListener('click', function(e){
                var box = document.querySelector('[data-lang-dropdown]');
                if (!box) return;
                if (!box.contains(e.target)) closeMenu();
            });

            document.addEventListener('keydown', function(e){
                if (e.key === 'Escape') closeMenu();
            });
        })();
    </script>
